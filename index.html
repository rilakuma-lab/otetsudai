<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <link rel="apple-touch-icon" href="icon.png?v=2">
    <title>おてつだいカレンダー（印刷強化版）</title>
    <style>
        html, body {
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f7f9fc;
            padding: 10px;
            color: #333;
        }
        .container {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        
        /* 👦👧 お子さん切り替えタブ */
        .child-switcher {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .child-tab {
            flex: 1;
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            background: #f0f2f5;
            border: 2px solid #d9d9d9;
            border-radius: 12px;
            cursor: pointer;
            color: #595959;
            transition: all 0.2s;
        }
        .child-tab.active {
            background: #fff3e6;
            border-color: #ff7f50;
            color: #ff7f50;
            box-shadow: 0 3px 6px rgba(255,127,80,0.15);
        }

        .status-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        .status-box {
            flex: 1;
            min-width: 45%;
            background: #fff;
            padding: 10px 5px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            box-shadow: inset 0 0 0 2px #ffe7ba;
            box-sizing: border-box;
        }
        .status-box.money { box-shadow: inset 0 0 0 2px #ffadd2; color: #eb2f96; }
        .status-box.rate { box-shadow: inset 0 0 0 2px #b7eb8f; color: #389e0d; }
        .status-box.bonus { box-shadow: inset 0 0 0 2px #adc6ff; color: #1d39c4; background: #f0f5ff; display: none; }
        .num { font-size: 20px; display: block; margin-top: 4px; }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }
        .month-title {
            font-size: 18px;
            font-weight: bold;
            color: #434343;
        }
        .nav-btn {
            background: #ff7f50;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 2px 0 #e0663b;
        }
        .nav-btn:active { transform: translateY(2px); box-shadow: none; }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            font-size: 12px;
            color: #8c8c8c;
            margin-bottom: 5px;
        }
        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            width: 100%;
        }
        .day {
            aspect-ratio: 1;
            background: #f5f5f5;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4px 2px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid transparent;
            box-sizing: border-box;
            min-width: 0;
        }
        .day:hover { background: #e6f7ff; border-color: #91d5ff; }
        .day.empty { background: transparent; cursor: default; border: none; }
        .day.today { border: 2px solid #ff7f50; background: #fff7e6; }
        
        .day-status { 
            font-size: 9px; 
            text-align: center; 
            margin-top: auto; 
            white-space: nowrap; 
            overflow: hidden; 
        }
        .text-green { color: #52c41a; }
        .text-orange { color: #fa8c16; font-size: 8px; }
        
        .text-hanamaru { 
            color: #ff4d4f; 
            font-size: 14px; 
            font-weight: bold;
            display: inline-block;
            animation: popEffect 0.3s ease;
        }

        @keyframes popEffect {
            0% { transform: scale(0.5); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .settings-section {
            margin-top: 30px;
            border-top: 2px dashed #e8e8e8;
            padding-top: 20px;
        }
        .settings-section h2 {
            font-size: 15px;
            color: #595959;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .input-group-names {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-group-names div { 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
            width: 100%; 
            box-sizing: border-box;
        }
        .input-group-names label { font-size: 12px; font-weight: bold; color: #595959; }
        .input-group-names input { 
            width: 100%; 
            box-sizing: border-box; 
            padding: 8px; 
            border: 1px solid #d9d9d9; 
            border-radius: 6px; 
            font-size: 14px; 
            background: white; 
        }
        
        @media (min-width: 400px) {
            .input-group-names { flex-direction: row; }
            .input-group-names div { flex: 1; }
        }

        .settings-section select { 
            width: 100%; 
            box-sizing: border-box; 
            padding: 8px; 
            border: 1px solid #d9d9d9; 
            border-radius: 6px; 
            font-size: 14px; 
            background: white; 
        }
        
        .config-row {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        .config-row input[type="text"] { flex: 3; padding: 6px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; min-width: 0; }
        .config-row input[type="number"] { flex: 1; padding: 6px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; text-align: right; min-width: 0; }
        .save-config-btn {
            width: 100%; background: #1890ff; color: white; border: none; padding: 10px;
            font-size: 14px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 5px;
        }

        /* 📱 印刷専用エリア（通常は隠す） */
        #print-only-info, #print-only-receipt { display: none; }

        /* 📱 iPhone等での「印刷用画面モード」のデザイン制御 */
        body.print-mode { background: white; padding: 0; }
        body.print-mode .child-switcher,
        body.print-mode .status-container,
        body.print-mode .nav-btn,
        body.print-mode .settings-section,
        body.print-mode #btn-print-start { display: none !important; }
        body.print-mode .container { box-shadow: none; border-radius: 0; padding: 5px; }
        body.print-mode .calendar-header { justify-content: center; font-size: 22px; margin-bottom: 5px; }
        body.print-mode .day { border: 1px solid #ccc; background: white; }
        body.print-mode .day.empty { border: none; }
        
        /* 印刷モード時のみ表示する */
        body.print-mode #print-only-info { display: block !important; text-align: center; margin-bottom: 15px; font-size: 16px; font-weight: bold; color: #eb2f96; background: #fff0f6; padding: 8px; border-radius: 8px; }
        body.print-mode #print-only-receipt { display: block !important; margin-top: 25px; border-top: 2px dashed #333; padding-top: 15px; }

        #btn-print-back { display: none; width: 100%; background: #8c8c8c; color: white; border: none; padding: 12px; font-size: 15px; font-weight: bold; border-radius: 10px; margin-bottom: 15px; cursor: pointer; }
        body.print-mode #btn-print-back { display: block !important; }

        /* 通常のPC/ブラウザ紙印刷用設定 */
        @media print {
            .child-switcher, .status-container, .nav-btn, .settings-section, .save-config-btn, .modal, #btn-print-start, #btn-print-back { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .container { box-shadow: none !important; padding: 0 !important; width: 100% !important; }
            .calendar-header { justify-content: center !important; font-size: 22px !important; margin-bottom: 5px !important; }
            .day { border: 1px solid #ccc !important; background: white !important; }
            .day.empty { border: none !important; }
            #print-only-info { display: block !important; text-align: center; margin-bottom: 15px; font-size: 16px; font-weight: bold; color: #eb2f96; background: #fff0f6; padding: 8px; border-radius: 8px; }
            #print-only-receipt { display: block !important; margin-top: 25px; border-top: 2px dashed #333; padding-top: 15px; }
        }

        /* 印刷画面内のテーブル装飾 */
        .print-task-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        .print-task-table th, .print-task-table td { border: 1px solid #d9d9d9; padding: 6px 8px; text-align: left; }
        .print-task-table th { background: #f5f5f5; }
        
        .receipt-box { display: flex; justify-content: space-between; margin-top: 15px; font-size: 13px; font-weight: bold; }
        .receipt-line { border-bottom: 1px solid #333; width: 180px; display: inline-block; height: 20px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️【重要】ここにFirebaseの設定値を貼り付けます
        const firebaseConfig = {
            apiKey: "AIzaSyAkiiegJkYx8AjmIv1S03_rWkTPOdxvydw",
    authDomain: "otetsdai-app.firebaseapp.com",
    projectId: "otetsdai-app",
    storageBucket: "otetsdai-app.firebasestorage.app",
    messagingSenderId: "589994607281",
    appId: "1:589994607281:web:acbcb4b609e1aa9a10d890"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.doc = doc;
        window.setDoc = setDoc;

        startSync();
    </script>
</head>
<body>

<div class="container">
    <button id="btn-print-back" onclick="togglePrintMode(false)">⬅️ もどる（記録画面へ）</button>

    <div class="child-switcher">
        <div class="child-tab active" id="tab-child1" onclick="switchChild(1)">👦 お子さん1</div>
        <div class="child-tab" id="tab-child2" onclick="switchChild(2)">👧 お子さん2</div>
    </div>
    
    <div class="status-container">
        <div class="status-box money">
            <span class="stat-month-label">今月</span>の貯金
            <span class="num"><span id="total-money">0</span>円</span>
        </div>
        <div class="status-box rate">
            <span class="stat-month-label">今月</span>の達成率
            <span class="num"><span id="achievement-rate">0</span>%</span>
        </div>
        <div class="status-box bonus" id="bonus-box">
            🎁 半期ボーナス
            <span class="num"><span id="bonus-money">0</span>円</span>
        </div>
    </div>

    <div class="calendar-header">
        <button class="nav-btn" onclick="changeMonth(-1)">◀ 前の月</button>
        <div class="month-title" id="calendar-title">----年--月</div>
        <button class="nav-btn" onclick="changeMonth(1)">次の月 ▶</button>
    </div>

    <div id="btn-print-start" style="text-align: center; margin-bottom: 15px;">
        <button class="nav-btn" style="background:#52c41a; font-size:14px; padding:8px 16px;" onclick="togglePrintMode(true)">🖨️ 印刷用の画面にする</button>
    </div>

    <div id="print-only-info">
        💰 今月の獲得おこづかい： <span id="print-total-money">0</span> 円
    </div>

    <div class="weekdays">
        <div style="color: #ff4d4f;">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div style="color: #1890ff;">土</div>
    </div>
    <div class="days" id="calendar-days"></div>

    <div id="print-only-receipt">
        <h4 style="margin: 0 0 5px 0; font-size: 13px; color:#555;">📋 今月のおてつだい内容</h4>
        <table class="print-task-table">
            <thead>
                <tr>
                    <th>おてつだいのなまえ</th>
                    <th style="width: 70px; text-align: right;">1回のほうしゅう</th>
                </tr>
            </thead>
            <tbody id="print-task-tbody">
                </tbody>
        </table>

        <div class="receipt-box">
            <div>📅 おこづかいをうけとった日: <span class="receipt-line"></span></div>
            <div>✍️ サイン（なまえ）: <span class="receipt-line"></span></div>
        </div>
    </div>

    <div class="settings-section">
        <h2>⚙️ アプリの設定</h2>
        
        <div class="input-group-names">
            <div>
                <label for="name1-input">👦 お子さん1のなまえ</label>
                <input type="text" id="name1-input" placeholder="例：たろう" value="" onchange="saveNamesOnly()">
            </div>
            <div>
                <label for="name2-input">👧 お子さん2のなまえ</label>
                <input type="text" id="name2-input" placeholder="例：はなこ" value="" onchange="saveNamesOnly()">
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px;">
            <label for="config-month-select" style="font-size: 12px; font-weight: bold; color: #595959;">📅 どこの設定をかえる？</label>
            <select id="config-month-select" onchange="onConfigMonthChange()">
            </select>
        </div>

        <label style="font-size: 12px; font-weight: bold; color: #595959; display: block; margin-bottom: 5px;">
            📝 <span id="config-target-name">お子さん</span> のおてつだいと金額
        </label>
        <div id="config-container"></div>
        <button class="save-config-btn" onclick="saveConfiguration()">この子のこの月の設定を保存する</button>
    </div>
</div>

<div class="modal" id="task-modal">
    <div class="modal-content">
        <h3 id="modal-date-title">きろく</h3>
        <p style="font-size: 11px; color: #666; text-align: center; margin-bottom: 10px;">項目ごとにえらんでね</p>
        
        <div id="modal-task-rows"></div>

        <div class="modal-btns">
            <button class="btn cancel" onclick="closeModal()">キャンセル</button>
            <button class="btn save" onclick="saveDayRecord()">保存する</button>
        </div>
    </div>
</div>

<script>
    let fullCloudData = {
        child1: { calendarData: {}, monthlyConfigs: {}, name: "お子さん1" },
        child2: { calendarData: {}, monthlyConfigs: {}, name: "お子さん2" }
    };

    let currentChildIdx = 1;
    let selectedDateStr = "";
    let displayDate = new Date();
    const today = new Date();

    const defaultTasks = [
        { name: "🧹 おへやのそうじ", price: 10 },
        { name: "🧺 せんたくものたたみ", price: 10 },
        { name: "🍽️ ごはんの準備・片付け", price: 10 },
        { name: "🌸 花の水やり・その他", price: 10 }
    ];

    window.addEventListener('resize', () => { initCalendar(); });
    window.addEventListener('orientationchange', () => { setTimeout(initCalendar, 100); });

    function startSync() {
        initMonthSelectOptions();
        syncConfigSelectWithDisplayDate();

        import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js").then((firestore) => {
            firestore.onSnapshot(firestore.doc(window.db, "otetsudaiApp", "sharedTwoChildrenData"), (docSnap) => {
                if (docSnap.exists()) {
                    fullCloudData = docSnap.data();
                    
                    document.getElementById('name1-input').value = fullCloudData.child1.name || "お子さん1";
                    document.getElementById('name2-input').value = fullCloudData.child2.name || "お子さん2";
                    
                    updateLabels();
                    renderSettingsInput();
                    initCalendar();
                } else {
                    renderSettingsInput();
                    initCalendar();
                }
            });
        });
    }

    async function uploadToCloud() {
        if (!window.db) return;
        try {
            await window.setDoc(window.doc(window.db, "otetsudaiApp", "sharedTwoChildrenData"), fullCloudData);
        } catch (e) {
            console.error("データ同期エラー: ", e);
        }
    }

    window.togglePrintMode = function(isPrint) {
        if (isPrint) {
            document.body.classList.add('print-mode');
        } else {
            document.body.classList.remove('print-mode');
        }
        initCalendar();
    }

    function switchChild(idx) {
        currentChildIdx = idx;
        document.getElementById('tab-child1').classList.toggle('active', idx === 1);
        document.getElementById('tab-child2').classList.toggle('active', idx === 2);
        
        updateLabels();
        renderSettingsInput();
        initCalendar();
    }

    function updateLabels() {
        const c1Name = fullCloudData.child1.name || "お子さん1";
        const c2Name = fullCloudData.child2.name || "お子さん2";
        
        document.getElementById('tab-child1').innerText = `👦 ${c1Name}`;
        document.getElementById('tab-child2').innerText = `👧 ${c2Name}`;
        
        const activeName = currentChildIdx === 1 ? c1Name : c2Name;
        document.getElementById('config-target-name').innerText = activeName;
    }

    function initMonthSelectOptions() {
        const select = document.getElementById('config-month-select');
        select.innerHTML = "";
        const year = displayDate.getFullYear();
        for (let m = 1; m <= 12; m++) {
            const opt = document.createElement('option');
            const monthKey = `${year}-${String(m).padStart(2, '0')}`;
            opt.value = monthKey;
            opt.innerText = `${year}年 ${m}月`;
            select.appendChild(opt);
        }
    }

    function syncConfigSelectWithDisplayDate() {
        const year = displayDate.getFullYear();
        const month = displayDate.getMonth() + 1;
        const monthKey = `${year}-${String(month).padStart(2, '0')}`;
        const select = document.getElementById('config-month-select');
        if(select) select.value = monthKey;
    }

    function getTaskConfigForMonth(monthKey) {
        const currentChild = currentChildIdx === 1 ? fullCloudData.child1 : fullCloudData.child2;
        const mConfigs = currentChild.monthlyConfigs || {};

        if (mConfigs[monthKey] && Array.isArray(mConfigs[monthKey]) && mConfigs[monthKey].length === 4) {
            return mConfigs[monthKey];
        }

        const parts = monthKey.split('-');
        const year = parts[0];
        const currentMonth = parseInt(parts[1]);

        for (let m = currentMonth - 1; m >= 1; m--) {
            const checkKey = `${year}-${String(m).padStart(2, '0')}`;
            if (mConfigs[checkKey] && Array.isArray(mConfigs[checkKey]) && mConfigs[checkKey].length === 4) {
                return mConfigs[checkKey];
            }
        }

        for (let m = 1; m <= 12; m++) {
            const checkKey = `${year}-${String(m).padStart(2, '0')}`;
            if (mConfigs[checkKey] && Array.isArray(mConfigs[checkKey]) && mConfigs[checkKey].length === 4) {
                return mConfigs[checkKey];
            }
        }

        return JSON.parse(JSON.stringify(defaultTasks));
    }

    function saveNamesOnly() {
        fullCloudData.child1.name = document.getElementById('name1-input').value.trim() || "お子さん1";
        fullCloudData.child2.name = document.getElementById('name2-input').value.trim() || "お子さん2";
        updateLabels();
        uploadToCloud();
    }

    function renderSettingsInput() {
        const select = document.getElementById('config-month-select');
        if (!select) return;
        const monthKey = select.value;
        const config = getTaskConfigForMonth(monthKey);
        
        const container = document.getElementById('config-container');
        container.innerHTML = "";
        config.forEach((task, i) => {
            const row = document.createElement('div');
            row.className = "config-row";
            row.innerHTML = `
                <input type="text" id="config-name-${i}" value="${task.name}" placeholder="お手伝い">
                <input type="number" id="config-price-${i}" value="${task.price}" min="0" placeholder="円">
            `;
            container.appendChild(row);
        });
    }

    function onConfigMonthChange() {
        renderSettingsInput();
    }

    function saveConfiguration() {
        const monthKey = document.getElementById('config-month-select').value;
        let newConfig = [];

        for (let i = 0; i < 4; i++) {
            const nameInput = document.getElementById(`config-name-${i}`).value.trim();
            const priceInput = parseInt(document.getElementById(`config-price-${i}`).value) || 0;
            newConfig.push({
                name: nameInput || `おてつだい ${i+1}`,
                price: priceInput
            });
        }

        const currentChild = currentChildIdx === 1 ? fullCloudData.child1 : fullCloudData.child2;
        if (!currentChild.monthlyConfigs) currentChild.monthlyConfigs = {};
        currentChild.monthlyConfigs[monthKey] = newConfig;

        const activeName = currentChildIdx === 1 ? fullCloudData.child1.name : fullCloudData.child2.name;
        alert(`${activeName}ちゃんの ${parseInt(monthKey.split('-')[1])}月 の設定を保存しました！`);
        uploadToCloud();
    }

    function initCalendar() {
        const year = displayDate.getFullYear();
        const month = displayDate.getMonth();
        const monthKey = `${year}-${String(month + 1).padStart(2, '0')}`;

        const titleEl = document.getElementById('calendar-title');
        const activeName = currentChildIdx === 1 ? (fullCloudData.child1.name || "お子さん1") : (fullCloudData.child2.name || "お子さん2");
        
        if(titleEl) {
            titleEl.innerText = document.body.classList.contains('print-mode') 
                ? `${activeName}ちゃん ${year}年${month + 1}月 のおてつだい記録`
                : `${year}年${month + 1}月`;
        }
        
        const labels = document.querySelectorAll('.stat-month-label');
        labels.forEach(l => l.innerText = `${month + 1}月`);

        syncConfigSelectWithDisplayDate();
        renderSettingsInput();

        // 印刷テーブル用のお手伝い内容挿入
        const currentMonthConfig = getTaskConfigForMonth(monthKey);
        const tbody = document.getElementById('print-task-tbody');
        if(tbody) {
            tbody.innerHTML = "";
            currentMonthConfig.forEach(t => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${t.name}</td><td style="text-align:right;">${t.price}円</td>`;
                tbody.appendChild(tr);
            });
        }

        const container = document.getElementById('calendar-days');
        if(!container) return;
        container.innerHTML = "";

        const firstDayIndex = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();
        
        const currentChild = currentChildIdx === 1 ? fullCloudData.child1 : fullCloudData.child2;
        const cData = currentChild.calendarData || {};

        for (let i = 0; i < firstDayIndex; i++) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = "day empty";
            container.appendChild(emptyDiv);
        }

        for (let day = 1; day <= totalDays; day++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = "day";
            const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            
            if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                dayDiv.classList.add('today');
            }

            let statusHtml = "-";
            if (cData[dateKey]) {
                let dayMoney = 0;
                let doneCount = 0;
                let hasOff = false;

                cData[dateKey].forEach((state, i) => {
                    if (state === 'done') {
                        dayMoney += currentMonthConfig[i] ? currentMonthConfig[i].price : 10;
                        doneCount++;
                    } else if (state === 'off') {
                        hasOff = true;
                    }
                });

                if (doneCount === 4) {
                    statusHtml = `<span class="text-hanamaru">💮</span>`;
                } else if (dayMoney > 0) {
                    statusHtml = `<span class="text-green">⭕+${dayMoney}</span>`;
                } else if (hasOff) {
                    statusHtml = `<span class="text-orange">お休み💤</span>`;
                }
            }

            dayDiv.innerHTML = `<span>${day}</span><div class="day-status" id="status-${dateKey}">${statusHtml}</div>`;
            
            if (!document.body.classList.contains('print-mode')) {
                dayDiv.onclick = () => openModal(dateKey, month + 1, day);
            }
            container.appendChild(dayDiv);
        }

        updateStats();
    }

    function changeMonth(offset) {
        displayDate.setMonth(displayDate.getMonth() + offset);
        initCalendar();
    }

    function openModal(dateKey, month, day) {
        selectedDateStr = dateKey;
        const monthKey = dateKey.substring(0, 7);
        const currentMonthConfig = getTaskConfigForMonth(monthKey);

        document.getElementById('modal-date-title').innerText = `${month}月${day}日 のきろく`;
        
        const rowsContainer = document.getElementById('modal-task-rows');
        rowsContainer.innerHTML = "";

        const currentChild = currentChildIdx === 1 ? fullCloudData.child1 : fullCloudData.child2;
        const cData = currentChild.calendarData || {};

        currentMonthConfig.forEach((task, i) => {
            let savedState = 'none';
            if (cData[dateKey] && cData[dateKey][i]) {
                savedState = cData[dateKey][i];
            }

            const row = document.createElement('div');
            row.className = "task-row";
            row.innerHTML = `
                <span class="task-name">${task.name} <span style="font-size:10px; color:#999; font-weight:normal;">(${task.price}円)</span></span>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="modal-task${i}" value="done" ${savedState === 'done' ? 'checked' : ''}>やった</label>
                    <label class="radio-label"><input type="radio" name="modal-task${i}" value="none" ${savedState === 'none' ? 'checked' : ''}>なし</label>
                    <label class="radio-label"><input type="radio" name="modal-task${i}" value="off" ${savedState === 'off' ? 'checked' : ''}>休み</label>
                </div>
            `;
            rowsContainer.appendChild(row);
        });

        document.getElementById('task-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('task-modal').style.display = 'none';
    }

    function saveDayRecord() {
        let dayStates = [];
        let hasData = false;

        for (let i = 0; i < 4; i++) {
            const selectedValue = document.querySelector(`input[name="modal-task${i}"]:checked`).value;
            dayStates.push(selectedValue);
            if (selectedValue === 'done' || selectedValue === 'off') {
                hasData = true;
            }
        }

        const currentChild = currentChildIdx === 1 ? fullCloudData.child1 : fullCloudData.child2;
        if (!currentChild.calendarData) currentChild.calendarData = {};

        if (hasData) {
            currentChild.calendarData[selectedDateStr] = dayStates;
        } else {
            delete currentChild.calendarData[selectedDateStr];
        }

        closeModal();
        uploadToCloud();
    }

    function updateStats() {
        let totalMoney = 0;
        let totalDoneTasks = 0;
        let totalTargetTasks = 0;

        const currentYear = displayDate.getFullYear();
        const currentMonth = displayDate.getMonth() + 1;
        const monthPrefix = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
        
        const currentChild = currentChildIdx === 1 ? fullCloudData.child1 : fullCloudData.child2;
        const cData = currentChild.calendarData || {};
        const currentMonthConfig = getTaskConfigForMonth(monthPrefix);

        for (let key in cData) {
            if (key.startsWith(monthPrefix)) {
                const dayStates = cData[key];
                dayStates.forEach((state, i) => {
                    if (state === 'done') {
                        totalMoney += currentMonthConfig[i] ? currentMonthConfig[i].price : 10;
                        totalDoneTasks++;
                        totalTargetTasks++;
                    } else if (state === 'none') {
                        totalTargetTasks++;
                    }
                });
            }
        }

        let rate = 0;
        if (totalTargetTasks > 0) {
            rate = Math.round((totalDoneTasks / totalTargetTasks) * 100);
        }

        const mEl = document.getElementById('total-money');
        const rEl = document.getElementById('achievement-rate');
        if(mEl) mEl.innerText = totalMoney;
        if(rEl) rEl.innerText = rate;

        // 印刷モード用金額
        const pmEl = document.getElementById('print-total-money');
        if(pmEl) pmEl.innerText = totalMoney.toLocaleString();

        const bonusBox = document.getElementById('bonus-box');
        
        if (currentMonth === 6 || currentMonth === 12) {
            if(bonusBox) bonusBox.style.display = "block";

            let targetPrefixes = [];
            if (currentMonth === 6) {
                for(let m=1; m<=6; m++) targetPrefixes.push(`${currentYear}-${String(m).padStart(2, '0')}`);
            } else {
                for(let m=7; m<=12; m++) targetPrefixes.push(`${currentYear}-${String(m).padStart(2, '0')}`);
            }

            let periodDone = 0;
            let periodTarget = 0;

            for (let key in cData) {
                let match = targetPrefixes.some(p => key.startsWith(p));
                if (match) {
                    const dayStates = cData[key];
                    dayStates.forEach(state => {
                        if (state === 'done') {
                            periodDone++;
                            periodTarget++;
                        } else if (state === 'none') {
                            periodTarget++;
                        }
                    });
                }
            }

            let periodRate = 0;
            if (periodTarget > 0) {
                periodRate = periodDone / periodTarget;
            }

            let totalConfigPrice = currentMonthConfig.reduce((sum, t) => sum + (t.price || 0), 0);
            let avgPrice = totalConfigPrice / currentMonthConfig.length;

            let bonusMoney = Math.round((avgPrice * 100) * periodRate);
            const bEl = document.getElementById('bonus-money');
            if(bEl) bEl.innerText = bonusMoney.toLocaleString();
        } else {
            if(bonusBox) bonusBox.style.display = "none";
        }
    }
</script>
